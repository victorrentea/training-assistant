name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install fastapi "uvicorn[standard]" websockets python-multipart httpx \
                      pytest pytest-anyio pytest-playwright anthropic \
                      prometheus-fastapi-instrumentator

      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium

      - name: Unit tests (API + scoring)
        run: pytest tests/test_main.py -v

      - name: JS unit tests
        run: node tests/test_participant_js.js

      - name: Generate version.js for tests
        run: echo "window.APP_VERSION = '$(date -u '+%Y-%m-%d %H:%M')';" > static/version.js

      - name: E2E browser tests
        env:
          HOST_USERNAME: host
          HOST_PASSWORD: testpass
        run: pytest tests/test_e2e.py -v -s --tb=short
