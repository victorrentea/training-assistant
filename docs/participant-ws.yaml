asyncapi: '2.6.0'
info:
  title: Training Assistant — Participant WebSocket Events
  version: '1.0'
  description: |
    Events received by participant browsers over WebSocket.
    Connection: WS wss://interact.victorrentea.ro/{session_id}/{participant_uuid}
    Participant WS is receive-only. All participant actions are REST calls.

servers:
  production:
    url: wss://interact.victorrentea.ro/{session_id}/{participant_uuid}
    protocol: wss

channels:
  /{session_id}/{participant_uuid}:
    subscribe:
      summary: Events received by participant
      message:
        oneOf:
          - $ref: '#/components/messages/slides_current'
          - $ref: '#/components/messages/slides_cache_status'
          - $ref: '#/components/messages/activity_updated'
          - $ref: '#/components/messages/participant_count_updated'
          - $ref: '#/components/messages/poll_opened'
          - $ref: '#/components/messages/poll_closed'
          - $ref: '#/components/messages/poll_correct_revealed'
          - $ref: '#/components/messages/poll_cleared'
          - $ref: '#/components/messages/poll_timer_started'
          - $ref: '#/components/messages/scores_updated'
          - $ref: '#/components/messages/wordcloud_updated'
          - $ref: '#/components/messages/qa_updated'
          - $ref: '#/components/messages/codereview_opened'
          - $ref: '#/components/messages/codereview_selection_closed'
          - $ref: '#/components/messages/codereview_line_confirmed'
          - $ref: '#/components/messages/codereview_cleared'
          - $ref: '#/components/messages/debate_updated'
          - $ref: '#/components/messages/debate_timer'
          - $ref: '#/components/messages/debate_round_ended'
          - $ref: '#/components/messages/leaderboard_revealed'
          - $ref: '#/components/messages/quiz_status'
          - $ref: '#/components/messages/quiz_preview'
          - $ref: '#/components/messages/transcription_language_pending'
          - $ref: '#/components/messages/reload'

components:
  messages:

    # ── Slides ────────────────────────────────────────────────────────────────

    slides_current:
      summary: Host navigated to a new slide
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [slides_current]
          slides_current:
            $ref: '#/components/schemas/SlidesCurrent'
            nullable: true
            description: null means no active slide

    slides_cache_status:
      summary: Download progress for a slide PDF
      payload:
        type: object
        required: [type, slides]
        properties:
          type:
            type: string
            enum: [slides_cache_status]
          slides:
            type: array
            items:
              $ref: '#/components/schemas/SlideWithCacheStatus'
            description: Slides list with embedded cache status fields

    # ── Activity ──────────────────────────────────────────────────────────────

    activity_updated:
      summary: Current activity type changed by host
      payload:
        type: object
        required: [type, current_activity]
        properties:
          type:
            type: string
            enum: [activity_updated]
          current_activity:
            type: string
            enum: [none, poll, wordcloud, qa, codereview, debate]

    # ── Identity ──────────────────────────────────────────────────────────────

    participant_count_updated:
      summary: Participant count changed
      payload:
        type: object
        required: [type, count]
        properties:
          type:
            type: string
            enum: [participant_count_updated]
          count:
            type: integer

    # ── Poll ─────────────────────────────────────────────────────────────────

    poll_opened:
      summary: Poll opened for voting
      payload:
        type: object
        required: [type, poll]
        properties:
          type:
            type: string
            enum: [poll_opened]
          poll:
            $ref: '#/components/schemas/Poll'

    poll_closed:
      summary: Voting closed by host
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [poll_closed]

    poll_correct_revealed:
      summary: Host revealed correct answers
      payload:
        type: object
        required: [type, correct_ids]
        properties:
          type:
            type: string
            enum: [poll_correct_revealed]
          correct_ids:
            type: array
            items:
              type: string

    poll_cleared:
      summary: Poll removed by host
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [poll_cleared]

    poll_timer_started:
      summary: Host started a countdown timer for the poll
      payload:
        type: object
        required: [type, seconds]
        properties:
          type:
            type: string
            enum: [poll_timer_started]
          seconds:
            type: integer

    # ── Scores ────────────────────────────────────────────────────────────────

    scores_updated:
      summary: One or more participants' scores changed
      payload:
        type: object
        required: [type, scores]
        properties:
          type:
            type: string
            enum: [scores_updated]
          scores:
            type: object
            additionalProperties:
              type: integer
            description: uuid → score (all participants)

    # ── Word Cloud ────────────────────────────────────────────────────────────

    wordcloud_updated:
      summary: Word cloud state changed (new word or topic update)
      payload:
        type: object
        required: [type, words, word_order, topic]
        properties:
          type:
            type: string
            enum: [wordcloud_updated]
          words:
            type: object
            additionalProperties:
              type: integer
            description: word → count
          word_order:
            type: array
            items:
              type: string
            description: Newest-first insertion order
          topic:
            type: string

    # ── Q&A ───────────────────────────────────────────────────────────────────

    qa_updated:
      summary: Q&A list changed (new question, upvote, edit, delete)
      payload:
        type: object
        required: [type, questions]
        properties:
          type:
            type: string
            enum: [qa_updated]
          questions:
            type: array
            items:
              $ref: '#/components/schemas/QAQuestion'

    # ── Code Review ───────────────────────────────────────────────────────────

    codereview_opened:
      summary: Host opened a code snippet for review
      payload:
        type: object
        required: [type, snippet, language]
        properties:
          type:
            type: string
            enum: [codereview_opened]
          snippet:
            type: string
          language:
            type: string
            nullable: true

    codereview_selection_closed:
      summary: Host closed the line selection phase
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [codereview_selection_closed]

    codereview_line_confirmed:
      summary: Host confirmed a line as problematic
      payload:
        type: object
        required: [type, line]
        properties:
          type:
            type: string
            enum: [codereview_line_confirmed]
          line:
            type: integer

    codereview_cleared:
      summary: Code review removed by host
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [codereview_cleared]

    # ── Debate ────────────────────────────────────────────────────────────────

    debate_updated:
      summary: Full debate state snapshot
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [debate_updated]
          statement:
            type: string
            nullable: true
          phase:
            type: string
            nullable: true
            enum: [null, side_selection, arguments, ai_cleanup, prep, live_debate, ended]
          sides:
            type: object
            additionalProperties:
              type: string
            description: uuid → "for"|"against"
          arguments:
            type: array
            items:
              $ref: '#/components/schemas/DebateArgument'
          champions:
            type: object
            additionalProperties:
              type: string
            description: '"for"|"against" → uuid'
          auto_assigned:
            type: array
            items:
              type: string
          first_side:
            type: string
            nullable: true
          round_index:
            type: integer
            nullable: true
          round_timer_seconds:
            type: integer
            nullable: true
          round_timer_started_at:
            type: string
            format: date-time
            nullable: true

    debate_timer:
      summary: A timed debate round started
      payload:
        type: object
        required: [type, round_index, seconds, started_at]
        properties:
          type:
            type: string
            enum: [debate_timer]
          round_index:
            type: integer
          seconds:
            type: integer
          started_at:
            type: string
            format: date-time

    debate_round_ended:
      summary: Current debate round ended
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [debate_round_ended]

    # ── Leaderboard ──────────────────────────────────────────────────────────

    leaderboard_revealed:
      summary: Leaderboard overlay shown with top positions
      payload:
        type: object
        required: [type, positions]
        properties:
          type:
            type: string
            enum: [leaderboard_revealed]
          positions:
            type: array
            items:
              $ref: '#/components/schemas/LeaderboardPosition'

    # ── Quiz ─────────────────────────────────────────────────────────────────

    quiz_status:
      summary: Quiz generation progress update
      payload:
        type: object
        required: [type, status, message]
        properties:
          type:
            type: string
            enum: [quiz_status]
          status:
            type: string
            description: '"generating"|"ready"|"error"'
          message:
            type: string

    quiz_preview:
      summary: Quiz preview for host review before publishing (quiz=null to clear)
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [quiz_preview]
          quiz:
            nullable: true
            description: Set to null to clear the preview
          question:
            type: string
          options:
            type: array
            items:
              type: string
          multi:
            type: boolean
          correct_indices:
            type: array
            items:
              type: integer

    transcription_language_pending:
      summary: Daemon detected a transcription language change
      payload:
        type: object
        required: [type, language]
        properties:
          type:
            type: string
            enum: [transcription_language_pending]
          language:
            type: string

    # ── Cross-cutting ────────────────────────────────────────────────────────

    reload:
      summary: Daemon synced static files — browser should reload
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [reload]

  schemas:

    SlidesCurrent:
      type: object
      properties:
        url:
          type: string
          nullable: true
        slug:
          type: string
          nullable: true
        presentation_name:
          type: string
          nullable: true
        current_page:
          type: integer
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    SlideWithCacheStatus:
      type: object
      required: [slug, status]
      properties:
        slug:
          type: string
        name:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        drive_export_url:
          type: string
          nullable: true
        status:
          type: string
          description: '"not_cached"|"downloading"|"cached"|"stale"|"poll_timeout"|"download_failed"'
        size_bytes:
          type: integer
          nullable: true
        downloaded_at:
          type: string
          format: date-time
          nullable: true

    CacheStatusEntry:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: '"downloading"|"ready"|"error"'
        size_bytes:
          type: integer
          nullable: true

    Poll:
      type: object
      required: [id, question, options, multi]
      properties:
        id:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: object
            required: [id, text]
            properties:
              id:
                type: string
              text:
                type: string
        multi:
          type: boolean

    QAQuestion:
      type: object
      required: [id, text, author_uuid, upvoter_uuids, answered, timestamp]
      properties:
        id:
          type: string
        text:
          type: string
        author_uuid:
          type: string
        upvoter_uuids:
          type: array
          items:
            type: string
          description: Client computes is_own and has_upvoted locally from its own UUID
        answered:
          type: boolean
        timestamp:
          type: number

    DebateArgument:
      type: object
      required: [id, author_uuid, side, text, upvoters, ai_generated]
      properties:
        id:
          type: string
        author_uuid:
          type: string
        side:
          type: string
          enum: [for, against]
        text:
          type: string
        upvoters:
          type: array
          items:
            type: string
        ai_generated:
          type: boolean
        merged_into:
          type: string
          nullable: true

    LeaderboardPosition:
      type: object
      required: [rank, name, score, avatar]
      properties:
        rank:
          type: integer
        name:
          type: string
        score:
          type: integer
        avatar:
          type: string
