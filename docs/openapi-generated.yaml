        required: true
        schema:
          type: string
          title: Question Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ToggleAnsweredBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/qa/clear:
    post:
      tags:
      - qa
      summary: Clear Qa
      description: Host clears all Q&A questions.
      operationId: clear_qa_api__session_id__host_qa_clear_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/participant/poll/vote:
    post:
      tags:
      - poll
      summary: Cast Vote
      description: Participant casts a vote.
      operationId: cast_vote_api_participant_poll_vote_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VoteRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/poll:
    post:
      tags:
      - poll
      summary: Create Poll
      description: Host creates a new poll.
      operationId: create_poll_api__session_id__host_poll_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePollRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
    delete:
      tags:
      - poll
      summary: Delete Poll
      description: Host deletes the current poll.
      operationId: delete_poll_api__session_id__host_poll_delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/poll/open:
    post:
      tags:
      - poll
      summary: Open Poll
      description: Host opens the poll for voting.
      operationId: open_poll_api__session_id__host_poll_open_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/poll/close:
    post:
      tags:
      - poll
      summary: Close Poll
      description: Host closes the poll.
      operationId: close_poll_api__session_id__host_poll_close_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/poll/correct:
    put:
      tags:
      - poll
      summary: Reveal Correct
      description: Host reveals correct answers and awards scores.
      operationId: reveal_correct_api__session_id__host_poll_correct_put
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RevealCorrectRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/poll/timer:
    post:
      tags:
      - poll
      summary: Start Timer
      description: Host starts a countdown timer for the poll.
      operationId: start_timer_api__session_id__host_poll_timer_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartTimerRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/quiz-md:
    get:
      tags:
      - quiz
      summary: Get Quiz Md
      description: Return the accumulated quiz markdown history.
      operationId: get_quiz_md_api__session_id__quiz_md_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/leaderboard/show:
    post:
      tags:
      - leaderboard
      summary: Show Leaderboard
      operationId: show_leaderboard_api__session_id__host_leaderboard_show_post
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/scores:
    delete:
      tags:
      - leaderboard
      summary: Reset Scores
      operationId: reset_scores_api__session_id__host_scores_delete
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/participant/paste:
    post:
      tags:
      - misc
      summary: Paste Text
      description: Participant pastes text to be seen by host.
      operationId: paste_text_api_participant_paste_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PasteRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/participant/notes:
    get:
      tags:
      - misc
      summary: Get Notes
      description: Get session notes content.
      operationId: get_notes_api_participant_notes_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/participant/summary:
    get:
      tags:
      - misc
      summary: Get Summary
      description: Get summary points and raw markdown.
      operationId: get_summary_api_participant_summary_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/participant/slides-cache-status:
    get:
      tags:
      - misc
      summary: Get Slides Cache Status
      description: Get slides cache status.
      operationId: get_slides_cache_status_api_participant_slides_cache_status_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/pastes:
    get:
      tags:
      - misc
      summary: Get Pastes
      description: Return all pending paste entries grouped by participant uuid.
      operationId: get_pastes_api__session_id__host_pastes_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/notes:
    get:
      tags:
      - misc
      summary: Get Host Notes
      description: Return current session notes content.
      operationId: get_host_notes_api__session_id__host_notes_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
  /api/{session_id}/host/summary:
    get:
      tags:
      - misc
      summary: Get Host Summary
      description: Return summary points, raw markdown, and updated_at timestamp.
      operationId: get_host_summary_api__session_id__host_summary_get
      responses:
        '200':
          description: Successful Response
          content:
