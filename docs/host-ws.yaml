asyncapi: '2.6.0'
info:
  title: Training Assistant — Host WebSocket Events
  version: '1.0'
  description: |
    Events received by the host panel browser over WebSocket.
    Connection: `WS ws://localhost:8081/{session_id}/__host__`

    **Host WS is receive-only.** All host actions are REST calls to the daemon.
    Full state is fetched via `GET /api/{session_id}/host/state` on connect/reconnect.

    The host WS is a direct connection to the daemon local server (port 8081),
    not through Railway. Events come from:
    - `send_to_host()` called by daemon feature routers
    - Daemon orchestrator loop (transcript status, token usage, etc.)

servers:
  daemon:
    url: ws://localhost:8081/{session_id}/__host__
    protocol: ws
    description: Daemon host panel WebSocket (host browser → daemon direct)

channels:
  /{session_id}/__host__:
    subscribe:
      summary: Events received by host browser
      message:
        oneOf:
          - $ref: '#/components/messages/state'
          - $ref: '#/components/messages/kicked'
          - $ref: '#/components/messages/reload'
          - $ref: '#/components/messages/redirect'
          - $ref: '#/components/messages/poll_created'
          - $ref: '#/components/messages/poll_opened'
          - $ref: '#/components/messages/poll_closed'
          - $ref: '#/components/messages/poll_correct_revealed'
          - $ref: '#/components/messages/poll_cleared'
          - $ref: '#/components/messages/poll_timer_started'
          - $ref: '#/components/messages/scores_updated'
          - $ref: '#/components/messages/vote_update'
          - $ref: '#/components/messages/participant_count'
          - $ref: '#/components/messages/qa_updated'
          - $ref: '#/components/messages/leaderboard_revealed'
          - $ref: '#/components/messages/leaderboard_hide'
          - $ref: '#/components/messages/emoji_reaction'
          - $ref: '#/components/messages/debate_timer'
          - $ref: '#/components/messages/debate_round_ended'
          - $ref: '#/components/messages/quiz_status'
          - $ref: '#/components/messages/quiz_preview'
          - $ref: '#/components/messages/notes'
          - $ref: '#/components/messages/summary'
          - $ref: '#/components/messages/slides_cache_status'
          - $ref: '#/components/messages/transcription_language'
          - $ref: '#/components/messages/transcription_language_pending'
          - $ref: '#/components/messages/timer'

components:
  messages:

    # ── Core / Session ────────────────────────────────────────────────────────

    state:
      summary: Full host state — synthesised from REST response on connect/reconnect
      description: |
        The host page loads state via `GET /api/{session_id}/host/state` on each
        WS connect. The REST response JSON is injected as `{type: "state"}` by
        the host JS — it is not pushed over the WS.
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [state]
          mode:
            type: string
            enum: [workshop, conference]
          current_activity:
            type: string
            enum: [none, poll, wordcloud, qa, debate, codereview]
          participant_count:
            type: integer
          participants:
            type: array
            items:
              $ref: '#/components/schemas/HostParticipant'
          daemon_connected:
            type: boolean
          daemon_last_seen:
            type: string
            format: date-time
            nullable: true
          session_id:
            type: string
            nullable: true
          session_name:
            type: string
            nullable: true
          session_main:
            type: object
            nullable: true
          poll:
            $ref: '#/components/schemas/Poll'
            nullable: true
          poll_active:
            type: boolean
          vote_counts:
            type: object
            additionalProperties:
              type: integer
          votes:
            type: object
            additionalProperties:
              description: uuid → option_id or list of option_ids
          poll_timer_seconds:
            type: integer
            nullable: true
          poll_timer_started_at:
            type: string
            format: date-time
            nullable: true
          poll_correct_ids:
            type: array
            items:
              type: string
            nullable: true
          wordcloud_words:
            type: object
            additionalProperties:
              type: integer
          wordcloud_word_order:
            type: array
            items:
              type: string
          wordcloud_topic:
            type: string
          qa_questions:
            type: array
            items:
              $ref: '#/components/schemas/HostQAQuestion'
          codereview:
            $ref: '#/components/schemas/HostCodeReview'
          debate_statement:
            type: string
            nullable: true
          debate_phase:
            type: string
            nullable: true
          debate_side_counts:
            type: object
            properties:
              for:
                type: integer
              against:
                type: integer
          debate_sides:
            type: object
            additionalProperties:
              type: string
            description: uuid → "for"|"against"
          debate_arguments:
            type: array
            items:
              $ref: '#/components/schemas/DebateArgument'
          debate_champions:
            type: object
            additionalProperties:
              type: string
          debate_auto_assigned:
            type: array
            items:
              type: string
          debate_first_side:
            type: string
            nullable: true
          debate_round_index:
            type: integer
            nullable: true
          debate_round_timer_seconds:
            type: integer
            nullable: true
          debate_round_timer_started_at:
            type: string
            format: date-time
            nullable: true
          leaderboard_active:
            type: boolean
          leaderboard_data:
            nullable: true
          summary_points:
            type: array
            items:
              $ref: '#/components/schemas/SummaryPoint'
          notes_content:
            type: string
            nullable: true
          token_usage:
            $ref: '#/components/schemas/TokenUsage'
          quiz_preview:
            nullable: true
          transcript_line_count:
            type: integer
          transcript_total_lines:
            type: integer
          transcript_latest_ts:
            type: string
            nullable: true
          transcription_language:
            type: string
            nullable: true
          slides_current:
            nullable: true
          overlay_connected:
            type: boolean
          pending_deploy:
            type: boolean
          git_repos:
            type: array
            items:
              $ref: '#/components/schemas/GitRepo'

    kicked:
      summary: Another host tab connected — this tab is being kicked
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [kicked]

    reload:
      summary: Daemon synced static files — browser should reload
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [reload]

    redirect:
      summary: Session changed — host should navigate to new URL
      payload:
        type: object
        required: [type, url]
        properties:
          type:
            type: string
            enum: [redirect]
          url:
            type: string

    # ── Poll ─────────────────────────────────────────────────────────────────

    poll_created:
      summary: Host created a new poll (self-notification)
      payload:
        type: object
        required: [type, poll]
        properties:
          type:
            type: string
            enum: [poll_created]
          poll:
            $ref: '#/components/schemas/Poll'

    poll_opened:
      summary: Poll opened for voting
      payload:
        type: object
        required: [type, poll]
        properties:
          type:
            type: string
            enum: [poll_opened]
          poll:
            $ref: '#/components/schemas/Poll'

    poll_closed:
      summary: Voting closed
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [poll_closed]
          vote_counts:
            type: object
            additionalProperties:
              type: integer
          total_votes:
            type: integer

    poll_correct_revealed:
      summary: Correct answers revealed and scores awarded
      payload:
        type: object
        required: [type, correct_ids, scores, votes]
        properties:
          type:
            type: string
            enum: [poll_correct_revealed]
          correct_ids:
            type: array
            items:
              type: string
          scores:
            type: object
            additionalProperties:
              type: integer
          votes:
            type: object
            additionalProperties:
              description: uuid → option_id or list of option_ids

    poll_cleared:
      summary: Poll deleted
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [poll_cleared]

    poll_timer_started:
      summary: Countdown timer started
      payload:
        type: object
        required: [type, seconds, started_at]
        properties:
          type:
            type: string
            enum: [poll_timer_started]
          seconds:
            type: integer
          started_at:
            type: string
            format: date-time

    timer:
      summary: Generic timer (legacy fallback)
      payload:
        type: object
        required: [type, seconds, started_at]
        properties:
          type:
            type: string
            enum: [timer]
          seconds:
            type: integer
          started_at:
            type: string
            format: date-time

    vote_update:
      summary: Real-time vote count update while poll is open
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [vote_update]
          vote_counts:
            type: object
            additionalProperties:
              type: integer
          total_votes:
            type: integer

    # ── Scores ────────────────────────────────────────────────────────────────

    scores_updated:
      summary: Scores changed
      payload:
        type: object
        required: [type, scores]
        properties:
          type:
            type: string
            enum: [scores_updated]
          scores:
            type: object
            additionalProperties:
              type: integer

    # ── Participants ──────────────────────────────────────────────────────────

    participant_count:
      summary: Participant list changed (join/leave/rename)
      payload:
        type: object
        required: [type, count]
        properties:
          type:
            type: string
            enum: [participant_count]
          count:
            type: integer
          participants:
            type: array
            items:
              $ref: '#/components/schemas/HostParticipant'

    # ── Q&A ───────────────────────────────────────────────────────────────────

    qa_updated:
      summary: Q&A list changed
      payload:
        type: object
        required: [type, questions]
        properties:
          type:
            type: string
            enum: [qa_updated]
          questions:
            type: array
            items:
              $ref: '#/components/schemas/HostQAQuestion'

    # ── Leaderboard ──────────────────────────────────────────────────────────

    leaderboard_revealed:
      summary: Host revealed leaderboard — self notification
      payload:
        type: object
        required: [type, entries, total_participants]
        properties:
          type:
            type: string
            enum: [leaderboard_revealed]
          entries:
            type: array
            items:
              $ref: '#/components/schemas/LeaderboardEntry'
            maxItems: 5
          total_participants:
            type: integer

    leaderboard_hide:
      summary: Leaderboard hidden — self notification
      payload:
        type: object
        properties:
          type:
            type: string
            enum: [leaderboard_hide]

    # ── Emoji ─────────────────────────────────────────────────────────────────

    emoji_reaction:
      summary: Participant sent an emoji reaction
      description: |
        Emoji events go directly to host (via `send_to_host()`) and to the
        desktop overlay. They are NOT broadcast to other participants.
      payload:
        type: object
        required: [type, emoji]
        properties:
          type:
            type: string
            enum: [emoji_reaction]
          emoji:
            type: string
            maxLength: 4

    # ── Debate ────────────────────────────────────────────────────────────────

    debate_timer:
      summary: Debate round timer started
      payload:
        type: object
        required: [type, round_index, seconds, started_at]
        properties:
          type:
            type: string
            enum: [debate_timer]
          round_index:
            type: integer
          seconds:
            type: integer
          started_at:
            type: string
            format: date-time
            nullable: true

    debate_round_ended:
      summary: Current debate round ended early
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [debate_round_ended]
          round_index:
            type: integer
            nullable: true

    # ── Quiz ─────────────────────────────────────────────────────────────────

    quiz_status:
      summary: Daemon quiz generation status update
      payload:
        type: object
        required: [type, status]
        properties:
          type:
            type: string
            enum: [quiz_status]
          status:
            type: string
            enum: [requested, generating, error]
          message:
            type: string

    quiz_preview:
      summary: Daemon generated a quiz preview
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [quiz_preview]
          quiz:
            nullable: true
            type: object
            properties:
              question:
                type: string
              options:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    text:
                      type: string
              multi:
                type: boolean
              correct_indices:
                type: array
                items:
                  type: integer
              source:
                type: string
                nullable: true
              page:
                type: string
                nullable: true

    # ── Summary / Notes ───────────────────────────────────────────────────────

    notes:
      summary: Session notes content changed
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [notes]
          notes_content:
            type: string
            nullable: true

    summary:
      summary: AI-generated summary updated
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [summary]
          points:
            type: array
            items:
              $ref: '#/components/schemas/SummaryPoint'
          updated_at:
            type: string
            format: date-time
            nullable: true

    # ── Slides ────────────────────────────────────────────────────────────────

    slides_cache_status:
      summary: Slide PDF cache status changed
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [slides_cache_status]
          slides_cache_status:
            type: object
            additionalProperties:
              type: object

    # ── Transcription ─────────────────────────────────────────────────────────

    transcription_language:
      summary: Daemon confirmed transcription language change
      payload:
        type: object
        required: [type, language]
        properties:
          type:
            type: string
            enum: [transcription_language]
          language:
            type: string
            enum: [ro, en, auto]

    transcription_language_pending:
      summary: Transcription language change pending (waiting for macos-addons)
      payload:
        type: object
        required: [type, language]
        properties:
          type:
            type: string
            enum: [transcription_language_pending]
          language:
            type: string
            enum: [ro, en, auto]

  schemas:
    Poll:
      type: object
      required: [id, question, options, multi]
      properties:
        id:
          type: string
        question:
          type: string
        options:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              text:
                type: string
        multi:
          type: boolean
        correct_count:
          type: integer
          nullable: true
        source:
          type: string
          nullable: true
        page:
          type: string
          nullable: true

    HostParticipant:
      type: object
      properties:
        uuid:
          type: string
        name:
          type: string
        score:
          type: integer
        location:
          type: string
        avatar:
          type: string
        paste_texts:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              text:
                type: string
          description: Only present if participant has pending paste entries

    HostQAQuestion:
      type: object
      properties:
        id:
          type: string
        text:
          type: string
        author:
          type: string
        author_uuid:
          type: string
        author_avatar:
          type: string
        upvote_count:
          type: integer
        upvoters:
          type: array
          items:
            type: string
        answered:
          type: boolean
        timestamp:
          type: number

    HostCodeReview:
      type: object
      properties:
        snippet:
          type: string
          nullable: true
        language:
          type: string
          nullable: true
        phase:
          type: string
          enum: [idle, selecting, reviewing]
        confirmed_lines:
          type: array
          items:
            type: integer
        selections:
          type: object
          additionalProperties:
            type: array
            items:
              type: integer
          description: uuid → sorted list of selected line numbers
        line_percentages:
          type: object
          additionalProperties:
            type: integer
          description: line_index → % (reviewing phase only)
        line_counts:
          type: object
          additionalProperties:
            type: integer
          description: line_index → absolute count (reviewing phase only)

    DebateArgument:
      type: object
      properties:
        id:
          type: string
        author_uuid:
          type: string
        side:
          type: string
          enum: [for, against]
        text:
          type: string
        upvoters:
          type: array
          items:
            type: string
        ai_generated:
          type: boolean
        merged_into:
          type: string
          nullable: true

    LeaderboardEntry:
      type: object
      properties:
        uuid:
          type: string
        name:
          type: string
        score:
          type: integer

    SummaryPoint:
      type: object
      properties:
        text:
          type: string
        source:
          type: string
          enum: [notes, discussion]
        time:
          type: string

    TokenUsage:
      type: object
      properties:
        input_tokens:
          type: integer
        output_tokens:
          type: integer
        estimated_cost_usd:
          type: number

    GitRepo:
      type: object
      properties:
        url:
          type: string
        branch:
          type: string
        files:
          type: array
          items:
            type: string
