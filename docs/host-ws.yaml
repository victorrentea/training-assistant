asyncapi: '2.6.0'
info:
  title: Training Assistant — Host WebSocket Events
  version: '1.0'
  description: |
    Events received by the host panel browser over WebSocket.
    Connection: `WS ws://localhost:8081/{session_id}/__host__`

    **Host WS is receive-only.** All host actions are REST calls to the daemon.
    Full state is fetched via `GET /api/{session_id}/host/state` on connect/reconnect.

servers:
  daemon:
    url: ws://localhost:8081/{session_id}/__host__
    protocol: ws
    description: Daemon host panel WebSocket (host browser → daemon direct)

channels:
  /{session_id}/__host__:
    subscribe:
      summary: Events received by host browser
      message:
        oneOf:
          - $ref: '#/components/messages/poll_created'
          - $ref: '#/components/messages/vote_update'
          - $ref: '#/components/messages/wordcloud_updated'
          - $ref: '#/components/messages/qa_updated'
          - $ref: '#/components/messages/codereview_selections_updated'
          - $ref: '#/components/messages/emoji_reaction'
          - $ref: '#/components/messages/quiz_status'
          - $ref: '#/components/messages/quiz_preview'
          - $ref: '#/components/messages/leaderboard_revealed'
          - $ref: '#/components/messages/paste_received'
          - $ref: '#/components/messages/file_uploaded'
          - $ref: '#/components/messages/participant_updated'

components:
  messages:

    # ── Poll ─────────────────────────────────────────────────────────────────

    poll_created:
      summary: Host-only notification when a new poll is created (before opening)
      payload:
        type: object
        required: [type, poll]
        properties:
          type:
            type: string
            enum: [poll_created]
          poll:
            type: object
            description: Poll data {id, question, options[], multi}

    vote_update:
      summary: Real-time vote tally while poll is open
      payload:
        type: object
        required: [type, votes]
        properties:
          type:
            type: string
            enum: [vote_update]
          votes:
            type: object
            description: option_id → vote count
            additionalProperties:
              type: integer

    # ── Word Cloud ────────────────────────────────────────────────────────────

    wordcloud_updated:
      summary: Word cloud updated (same payload as participant)
      payload:
        type: object
        required: [type, words, word_order, topic]
        properties:
          type:
            type: string
            enum: [wordcloud_updated]
          words:
            type: object
            description: word → count
            additionalProperties:
              type: integer
          word_order:
            type: array
            description: Words ordered newest first
            items:
              type: string
          topic:
            type: string

    # ── Q&A ───────────────────────────────────────────────────────────────────

    qa_updated:
      summary: Q&A list changed (same structure as participant)
      payload:
        type: object
        required: [type, questions]
        properties:
          type:
            type: string
            enum: [qa_updated]
          questions:
            type: array
            items:
              $ref: '#/components/schemas/QAQuestion'

    # ── Code Review ───────────────────────────────────────────────────────────

    codereview_selections_updated:
      summary: Aggregated line selection counts (host-only)
      payload:
        type: object
        required: [type, line_counts]
        properties:
          type:
            type: string
            enum: [codereview_selections_updated]
          line_counts:
            type: object
            description: line number → count of participants who selected it
            additionalProperties:
              type: integer

    # ── Emoji ─────────────────────────────────────────────────────────────────

    emoji_reaction:
      summary: Participant sent an emoji reaction — floating animation on host screen
      payload:
        type: object
        required: [type, emoji]
        properties:
          type:
            type: string
            enum: [emoji_reaction]
          emoji:
            type: string
            maxLength: 4

    # ── Quiz Generation ───────────────────────────────────────────────────────

    quiz_status:
      summary: Quiz generation progress update
      payload:
        type: object
        required: [type, status]
        properties:
          type:
            type: string
            enum: [quiz_status]
          status:
            type: string
            description: '"generating" | "ready" | "error"'
          message:
            type: string

    quiz_preview:
      summary: Generated quiz ready for host review (quiz=null to clear)
      payload:
        type: object
        required: [type]
        properties:
          type:
            type: string
            enum: [quiz_preview]
          quiz:
            nullable: true
            description: Set to null to clear the preview
          question:
            type: string
          options:
            type: array
            items:
              type: object
              required: [id, text]
              properties:
                id:
                  type: string
                text:
                  type: string
          multi:
            type: boolean
          correct_indices:
            type: array
            items:
              type: integer

    # ── Leaderboard ───────────────────────────────────────────────────────────

    leaderboard_revealed:
      summary: Leaderboard revealed (same payload as participant)
      payload:
        type: object
        required: [type, positions]
        properties:
          type:
            type: string
            enum: [leaderboard_revealed]
          positions:
            type: array
            items:
              $ref: '#/components/schemas/LeaderboardPosition'

    # ── Paste & File Upload ───────────────────────────────────────────────────

    paste_received:
      summary: Participant submitted a text paste
      payload:
        type: object
        required: [type, uuid, id, text]
        properties:
          type:
            type: string
            enum: [paste_received]
          uuid:
            type: string
            description: Participant UUID who submitted the paste
          id:
            type: string
            description: Paste ID
          text:
            type: string

    file_uploaded:
      summary: Participant uploaded a file (daemon has downloaded it to session folder)
      payload:
        type: object
        required: [type, uuid, id, filename, size]
        properties:
          type:
            type: string
            enum: [file_uploaded]
          uuid:
            type: string
            description: Participant UUID who uploaded the file
          id:
            type: string
            description: File ID
          filename:
            type: string
          size:
            type: integer
            description: File size in bytes

    # ── Participants ──────────────────────────────────────────────────────────

    participant_updated:
      summary: Participant list changed (join/leave/rename/location)
      payload:
        type: object
        required: [type, count, participants]
        properties:
          type:
            type: string
            enum: [participant_updated]
          count:
            type: integer
          participants:
            type: array
            items:
              $ref: '#/components/schemas/HostParticipant'

  schemas:

    QAQuestion:
      type: object
      required: [id, text, author_uuid, upvoter_uuids, answered, timestamp]
      properties:
        id:
          type: string
        text:
          type: string
        author_uuid:
          type: string
        upvoter_uuids:
          type: array
          items:
            type: string
        answered:
          type: boolean
        timestamp:
          type: number

    LeaderboardPosition:
      type: object
      required: [rank, name, score, avatar]
      properties:
        rank:
          type: integer
        name:
          type: string
        score:
          type: integer
        avatar:
          type: string

    HostParticipant:
      type: object
      required: [uuid, name, score, avatar]
      properties:
        uuid:
          type: string
        name:
          type: string
        score:
          type: integer
        location:
          type: string
          nullable: true
        avatar:
          type: string
