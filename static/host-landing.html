<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop - Start Session</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon-host.svg">
  <link rel="stylesheet" href="/static/common.css">
  <link rel="stylesheet" href="/static/host-landing.css">
</head>
<body>
  <div id="app"></div>
  <script src="/static/version.js"></script>
  <script src="/static/version-age.js"></script>
  <script src="/static/version-reload.js"></script>
  <script src="/static/host-landing.js"></script>
  <div class="version-tag" id="version-tag"></div>
  <script>
    window.renderDeployAge && window.renderDeployAge('version-tag');
    (function () {
      const guard = window.createVersionReloadGuard
        ? window.createVersionReloadGuard({ countdownSeconds: 10 })
        : null;
      if (!guard) return;
      function poll() {
        fetch('/api/status').then(r => r.json()).then(d => {
          guard.check(d.backend_version);
        }).catch(() => {});
      }
      poll();
      setInterval(poll, 30000);
    })();
  </script>
</body>
</html>
