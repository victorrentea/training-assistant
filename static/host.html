<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop — Host Panel</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon-host.svg" />
  <link rel="stylesheet" href="/static/common.css" />
  <link rel="stylesheet" href="/static/host.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>
<div class="layout">

  <header>
    <h1>🎛 Host Panel</h1>
    <div>
      <span id="ws-badge" class="badge disconnected">● Disconnected</span>
    </div>
  </header>

  <div class="grid">

    <!-- Stats -->
    <div class="card">
      <div class="session-header">
        <div>
          <h2 style="margin-bottom:.5rem;">Session</h2>
          <div class="stat" id="pax-count">0</div>
          <div class="stat-label">participants connected</div>
        </div>
        <div id="qr-code" class="qr-code" title="Click to enlarge" style="margin-top:0; flex-shrink:0;"></div>
      </div>
      <ul id="pax-list" class="pax-list" title="Click a location to view map"></ul>
      <div style="margin-top:.75rem; font-size:.85rem; color:var(--muted);">
        Join at: <a id="participant-link" style="color:var(--accent); word-break:break-all;" href="/" target="_blank"></a>
      </div>
    </div>

  <!-- QR fullscreen overlay -->
  <div id="qr-overlay" onclick="closeQR()">
    <div id="qr-fullscreen"></div>
    <div id="qr-overlay-url"></div>
  </div>

    <!-- Create poll -->
    <div class="card">
      <h2>Create Poll</h2>
      <div id="poll-input" class="poll-composer" contenteditable="true" spellcheck="false"
           data-placeholder="Question title&#10;&#10;Option A&#10;Option B&#10;Option C"></div>
      <div class="btn-row" style="align-items:center;">
        <button class="btn btn-primary" id="create-btn">Create</button>
        <label style="display:flex; align-items:center; gap:.4rem; font-size:.9rem; color:var(--text); cursor:pointer; margin:0;">
          <input type="checkbox" id="multi-check" style="width:1rem; height:1rem; cursor:pointer;" />
          Multi-select
        </label>
      </div>
      <div class="or-divider"><span>or</span></div>
      <div class="quiz-gen-row">
        <button class="btn btn-warn" id="gen-quiz-btn" onclick="requestQuiz()">🤖 Generate</button>
        <div style="display:flex;align-items:center;gap:.4rem;font-size:.9rem;color:var(--text);">
          from last
          <select id="quiz-minutes" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.3rem .5rem;font-size:.9rem;cursor:pointer;">
            <option value="15">15 min</option>
            <option value="30" selected>30 min</option>
            <option value="60">1 hour</option>
            <option value="480">whole day</option>
          </select>
        </div>
      </div>
      <div id="quiz-status" style="margin-top:.4rem;font-size:.85rem;color:var(--muted);min-height:1.2em;"></div>
      <div id="daemon-status" style="margin-top:.25rem; font-size:.82rem; color:var(--muted);"></div>
    </div>

    <!-- Generated preview -->
    <div class="card" id="preview-card" style="grid-column: 1 / -1; display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
        <h2 style="margin:0;">🤖 Generated Question</h2>
      </div>
      <div id="preview-display"></div>
      <div class="btn-row" style="margin-top:1rem;">
        <button class="btn btn-success" onclick="firePreview()">🚀 Launch</button>
      </div>
    </div>

    <!-- Poll controls -->
    <div class="card" style="grid-column: 1 / -1;">
      <h2>Current Poll</h2>
      <div id="poll-display"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Map modal -->
<div id="map-overlay" onclick="closeMap(event)">
  <div id="map-dialog" onclick="event.stopPropagation()">
    <div id="map-header">
      <span id="map-title">Participant Locations</span>
      <button id="map-close" onclick="closeMap()" title="Close">✕</button>
    </div>
    <div id="map-container"></div>
  </div>
</div>

<script src="/static/host.js"></script>
</body>
</html>
