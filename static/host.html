<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Host</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon-host.svg" />
  <link rel="stylesheet" href="/static/common.css" />
  <link rel="stylesheet" href="/static/host.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1/build/d3.layout.cloud.js"></script>
</head>
<body>

<div class="host-columns">

  <!-- LEFT COLUMN: controls -->
  <div class="host-col host-col-left">
    <!-- Tab switcher -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tab-poll" onclick="switchTab('poll')">📊 Poll</button>
      <button class="tab-btn" id="tab-wordcloud" onclick="switchTab('wordcloud')">☁ Words</button>
      <button class="tab-btn" id="tab-qa" onclick="switchTab('qa')">❓ Q&A</button>
    </div>

    <!-- Poll tab content -->
    <div id="tab-content-poll" class="tab-content">
      <div id="poll-input" class="poll-composer" contenteditable="true" spellcheck="false"
           data-placeholder="Question title&#10;&#10;Option A&#10;Option B&#10;Option C"></div>
      <div class="btn-row" style="align-items:center;">
        <button class="btn btn-primary" id="create-btn">🚀 Launch</button>
        <label style="display:flex; align-items:center; gap:.4rem; font-size:.9rem; color:var(--text); cursor:pointer; margin:0;">
          <input type="checkbox" id="multi-check" style="width:1rem; height:1rem; cursor:pointer;" />
          Multi-select
        </label>
        <label id="correct-count-label" style="display:none; align-items:center; gap:.4rem; font-size:.9rem; color:var(--text); margin:0;">
          <input type="number" id="correct-count" min="1" max="8" value="2"
                 style="width:3.2rem; height:34px; box-sizing:border-box; text-align:center; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:6px; font-size:.9rem;" />
          correct
        </label>
      </div>
      <div class="or-divider"><span>or</span></div>
      <div class="quiz-gen-row">
        <div class="quiz-gen-controls" style="display:flex;flex-direction:column;gap:.35rem;align-items:flex-start;">
          <div style="font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:.4rem;">
            from topic:
            <input id="quiz-topic" type="text" maxlength="60" autocomplete="off"
                   placeholder="e.g. circuit breaker"
                   oninput="updateGenBtn()"
                   onkeydown="if(event.key==='Enter')requestQuiz()"
                   style="background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.2rem .5rem;font-size:.85rem;width:10rem;" />
          </div>
          <div style="font-size:.85rem;color:var(--muted);display:flex;align-items:center;gap:.4rem;">
            from what we discussed the last
            <select id="quiz-minutes" style="background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.2rem .4rem;font-size:.85rem;cursor:pointer;">
              <option value="15">15 min</option>
              <option value="30" selected>30 min</option>
              <option value="60">1 hour</option>
              <option value="90">1.5 hours</option>
              <option value="480">whole day</option>
            </select>
          </div>
          <button class="btn btn-warn" id="gen-quiz-btn" onclick="requestQuiz()" style="align-self:flex-start;">Generate from transcript</button>
        </div>
        <span id="quiz-status"></span>
      </div>
      <!-- Generated preview (inline in left column) -->
      <div id="preview-card" style="display:none; margin-top:.75rem;">
        <h3 style="margin:0 0 .5rem; font-size:.95rem; color:var(--accent);">🤖 Generated Question</h3>
        <div id="preview-display"></div>
        <div class="btn-row" style="margin-top:.5rem;">
          <button class="btn btn-success" onclick="firePreview()">🚀 Launch</button>
        </div>
      </div>
    </div>

    <!-- Word Cloud tab content -->
    <div id="tab-content-wordcloud" class="tab-content" style="display:none;">
      <div style="margin-top:.75rem;">
        <div class="wc-input-row" style="margin-bottom:.5rem;">
          <input id="wc-topic-input" type="text" maxlength="80" autocomplete="off" placeholder="topic (optional)" style="flex:1;padding:.5rem .75rem;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:.9rem;" />
          <button class="btn btn-secondary" onclick="pushWordCloudTopic()">Push</button>
        </div>
        <div class="wc-input-row">
          <input id="wc-host-input" type="text" maxlength="40" autocomplete="on" placeholder="Submit a word…" list="wc-host-suggestions" />
          <datalist id="wc-host-suggestions"></datalist>
          <button class="btn btn-primary" onclick="hostSubmitWord()">↵</button>
        </div>
      </div>
      <ul id="wc-host-words" style="margin-top:.5rem; list-style:disc; padding-left:1.25rem; color:var(--muted); font-size:.85rem; max-height:180px; overflow-y:auto;"></ul>
      <div style="margin-top:.5rem;">
        <button class="btn btn-danger" onclick="downloadAndClearWordCloud()">⬇ Download image and close</button>
      </div>
    </div>

    <!-- Q&A tab content -->
    <div id="tab-content-qa" class="tab-content" style="display:none;">
      <div class="qa-input-row" style="margin-top:.5rem;">
        <input id="host-qa-input" type="text" maxlength="280" autocomplete="off"
               placeholder="Ask a question as host…"
               onkeydown="if(event.key==='Enter')hostSubmitQA()" />
        <button id="host-qa-submit-btn" class="btn btn-primary" onclick="hostSubmitQA()">↵</button>
      </div>
      <div style="margin-top:.5rem;">
        <button id="clear-qa-btn" class="btn btn-danger" onclick="clearQA()">🗑 Clear all</button>
      </div>
    </div>

    <!-- Status badges — pinned to bottom of left column -->
    <div class="left-status-bar">
      <span id="ws-badge" class="badge disconnected">● Server</span>
      <span id="daemon-badge" class="badge disconnected" title="">Agent</span>
      <span id="summary-badge" class="badge disconnected" title="Key points" onclick="toggleSummaryModal()" style="cursor:pointer; display:none">📋 Summary</span>
    </div>
  </div>

  <!-- CENTER COLUMN: current activity -->
  <div class="host-col host-col-center">
    <!-- QR idle state -->
    <div id="center-qr" class="center-panel">
      <div id="qr-code" class="qr-code" title="Click to brighten"></div>
    </div>
    <!-- Poll results panel -->
    <div id="center-poll" class="center-panel" style="display:none;">
      <div style="display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; margin-bottom:.9rem;">
        <h2 style="margin:0; font-size:.95rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em;">Current Poll</h2>
        <span id="poll-pills"></span>
      </div>
      <div id="poll-display"></div>
    </div>
    <!-- Word cloud panel -->
    <div id="center-wordcloud" class="center-panel" style="display:none;">
      <canvas id="host-wc-canvas"></canvas>
    </div>
    <!-- Q&A results panel -->
    <div id="center-qa" class="center-panel" style="display:none;">
      <h2 style="margin:0 0 .9rem; font-size:.95rem; color:var(--muted); text-transform:uppercase; letter-spacing:.08em;">
        ❓ Questions — <span id="qa-count">0</span>
      </h2>
      <div id="qa-list"></div>
    </div>
  </div>

  <!-- RIGHT COLUMN: participants -->
  <div class="host-col host-col-right">
    <div class="right-header">
      <div class="stat" id="pax-count">0</div>
      <div class="stat-label">participants connected</div>
    </div>
    <ul id="pax-list" class="pax-list" title="Click a location to view map"></ul>
    <div class="right-footer">
      <span style="display:flex; align-items:center; gap:.5rem; flex-wrap:nowrap; min-width:0;">
        <a id="participant-link" style="color:#fff; font-size:1.25rem; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; flex-shrink:1; direction:rtl; text-align:left;" href="/" target="_blank"></a>
        <div id="qr-icon" title="Show QR code" style="cursor:pointer; opacity:.5; flex-shrink:0; width:28px; height:28px;">
          <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="currentColor" width="28" height="28">
            <rect x="5" y="5" width="35" height="35" rx="4"/>
            <rect x="13" y="13" width="19" height="19" rx="2" fill="var(--bg,#1a1a2e)"/>
            <rect x="18" y="18" width="9" height="9" rx="1"/>
            <rect x="60" y="5" width="35" height="35" rx="4"/>
            <rect x="68" y="13" width="19" height="19" rx="2" fill="var(--bg,#1a1a2e)"/>
            <rect x="73" y="18" width="9" height="9" rx="1"/>
            <rect x="5" y="60" width="35" height="35" rx="4"/>
            <rect x="13" y="68" width="19" height="19" rx="2" fill="var(--bg,#1a1a2e)"/>
            <rect x="18" y="73" width="9" height="9" rx="1"/>
            <rect x="60" y="60" width="9" height="9" rx="1"/>
            <rect x="73" y="60" width="9" height="9" rx="1"/>
            <rect x="86" y="60" width="9" height="9" rx="1"/>
            <rect x="60" y="73" width="9" height="9" rx="1"/>
            <rect x="86" y="73" width="9" height="9" rx="1"/>
            <rect x="60" y="86" width="9" height="9" rx="1"/>
            <rect x="73" y="86" width="9" height="9" rx="1"/>
          </svg>
        </div>
        <div id="map-icon" title="Show participant map" onclick="openMap()" style="cursor:pointer; opacity:.5; flex-shrink:0; width:28px; height:28px;">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" width="28" height="28">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5S13.38 11.5 12 11.5z"/>
          </svg>
        </div>
        <button class="btn btn-danger" onclick="resetScores()" title="Reset all scores to zero" style="white-space:nowrap; flex-shrink:1; overflow:hidden; text-overflow:ellipsis; min-width:0;">↺ Reset scores</button>
      </span>
    </div>
  </div>

</div>

<!-- QR fullscreen overlay -->
<div id="qr-overlay" onclick="closeQR()">
  <div id="qr-fullscreen"></div>
  <div id="qr-overlay-url"></div>
</div>

<div class="toast" id="toast"></div>

<!-- Map modal -->
<div id="map-overlay" onclick="closeMap(event)">
  <div id="map-dialog" onclick="event.stopPropagation()">
    <div id="map-header">
      <span id="map-title">Participant Locations</span>
      <button id="map-close" onclick="closeMap()" title="Close">✕</button>
    </div>
    <div id="map-container"></div>
  </div>
</div>

<div id="summary-overlay" class="summary-overlay" onclick="closeSummaryModal()">
  <div class="summary-dialog" onclick="event.stopPropagation()">
    <div class="summary-header">
      <span>📋 Key Points</span>
      <button class="summary-close" onclick="closeSummaryModal()">✕</button>
    </div>
    <ul id="summary-list" class="summary-list"></ul>
    <div id="summary-time" class="summary-time"></div>
  </div>
</div>

<script src="/static/version.js"></script>
<script src="/static/version-age.js"></script>
<script src="/static/version-reload.js"></script>
<script src="/static/host.js"></script>
<div class="version-tag" id="version-tag"></div>
<script>window.renderDeployAge && window.renderDeployAge('version-tag');</script>
</body>
</html>
