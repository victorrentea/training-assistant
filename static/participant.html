<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interact</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon-participant.svg" />
  <link rel="stylesheet" href="/static/common.css" />
  <link rel="stylesheet" href="/static/participant.css" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1/build/d3.layout.cloud.js"></script>
</head>
<body>

  <h1>🎙 Workshop</h1>

  <!-- Join screen -->
  <div id="join-screen">
    <h2>Your name</h2>
    <div class="name-input-wrap">
      <input id="name-input" type="text" maxlength="32" autocomplete="off" />
      <button id="clear-name" title="Clear name">✕</button>
    </div>
    <button id="join-btn">Join session</button>
  </div>

  <!-- Main screen (shown after joining) -->
  <div id="main-screen">
    <div class="status-bar">
      <span><span class="dot"></span> Connected as <strong id="display-name"></strong></span>
      <span style="display:flex;align-items:center;gap:1rem;">
        <span id="pax-count"></span>
        <span id="my-score" style="display:none; color:var(--accent2); font-weight:700; font-size:.9rem;"></span>
        <button id="leave-btn" title="Change name">✕ Leave</button>
      </span>
    </div>
    <div id="content"></div>
  </div>

<script src="/static/participant.js"></script>
</body>
</html>
