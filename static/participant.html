<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop - Interact</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon-participant.svg" />
  <link rel="stylesheet" href="/static/common.css" />
  <link rel="stylesheet" href="/static/participant.css" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1/build/d3.layout.cloud.js"></script>
</head>
<body>

  <!-- Join screen -->
  <div id="join-screen">
    <h2>Your name</h2>
    <div class="name-input-wrap">
      <input id="name-input" type="text" maxlength="32" autocomplete="off" />
      <button id="clear-name" title="Clear name">✕</button>
    </div>
    <button id="join-btn">Join session</button>
    <p id="join-error" style="color:var(--danger); font-size:.9rem; margin:.5rem 0 0; display:none;"></p>
  </div>

  <!-- Main screen (shown after joining) -->
  <div id="main-screen">
    <div class="status-bar">
      <span class="status-left">
        <span class="mic-icon">🎙</span>
        <span><span class="dot"></span> <strong id="display-name"></strong></span>
        <span id="my-score" style="display:none; color:var(--accent2); font-weight:700; font-size:.85rem;"></span>
      </span>
      <span class="status-right">
        <span id="location-prompt" class="location-prompt" onclick="requestLocation()" title="Share your location">📍 Where are you?</span>
        <span id="pax-count"></span>
        <button id="leave-btn" title="Change name">☢️ Leave</button>
      </span>
    </div>
    <div id="content"></div>
  </div>

<script src="/static/version.js"></script>
<script src="/static/version-age.js"></script>
<script src="/static/version-reload.js"></script>
<script src="/static/participant.js"></script>
<div class="version-tag" id="version-tag"></div>
<script>window.renderDeployAge && window.renderDeployAge('version-tag');</script>
<div id="qa-toast"></div>
</body>
</html>
