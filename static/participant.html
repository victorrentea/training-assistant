<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop - Interact</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon-participant.svg" />
  <link rel="stylesheet" href="/static/common.css" />
  <link rel="stylesheet" href="/static/participant.css" />
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/d3-cloud@1/build/d3.layout.cloud.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>

  <!-- Main screen (auto-join, no join screen) -->
  <div id="main-screen">
    <div class="status-bar">
      <span class="status-left">
        <img id="my-avatar" class="avatar" style="display:none" alt="">
        <span><span class="dot"></span>
            <strong id="display-name" class="editable-name" title="Click to change name"></strong>
            <button id="edit-name-btn" class="edit-name-btn" title="Change name" style="display:none;">✏️</button>
            <span id="name-edit-wrap" style="display:none;">
                <input id="name-edit-input" type="text" maxlength="32" />
            </span>
        </span>
        <span id="my-score" style="display:none; color:var(--accent2); font-weight:700; font-size:.85rem;"></span>
      </span>
      <span class="status-center">
        <button id="notes-btn" class="header-link-btn" title="Session notes" style="display:none" onclick="toggleNotesModal()">📝 Notes</button>
        <button id="summary-btn" class="header-link-btn" title="Key points discussed" style="display:none" onclick="toggleSummaryModal()">🧠 Key Points</button>
      </span>
      <span class="status-right">
        <span id="location-prompt" class="location-prompt" onclick="requestLocation()" title="Share your location">📍 Where are you?</span>
        <span id="host-dot" title="Host connected" style="display:none;"><span class="dot"></span>Host</span>
        <span id="pax-count"></span>
        <button id="notif-btn" title="Enable notifications" style="display:none">🔔</button>
      </span>
    </div>
    <div id="content"></div>
  </div>

<div id="notes-overlay" class="summary-overlay" onclick="closeNotesModal()">
  <div class="summary-dialog" onclick="event.stopPropagation()">
    <div class="summary-header">
      <span>📝 Session Notes</span>
      <span>
        <a id="notes-newtab" href="/notes" target="_blank" class="modal-newtab-btn" title="Open in new tab">↗</a>
        <button class="summary-close" onclick="closeNotesModal()">✕</button>
      </span>
    </div>
    <pre id="notes-content" class="notes-content"></pre>
  </div>
</div>

<div id="summary-overlay" class="summary-overlay" onclick="closeSummaryModal()">
  <div class="summary-dialog" onclick="event.stopPropagation()">
    <div class="summary-header">
      <span>🧠 Key Points</span>
      <span>
        <button class="modal-newtab-btn" onclick="downloadKeyPoints()" title="Download as text file">⬇</button>
        <a href="/notes" target="_blank" class="modal-newtab-btn" title="Open in new tab">↗</a>
        <button class="summary-close" onclick="closeSummaryModal()">✕</button>
      </span>
    </div>
    <ul id="summary-list" class="summary-list"></ul>
    <div id="summary-time" class="summary-time"></div>
  </div>
</div>

<script src="/static/version.js"></script>
<script src="/static/version-age.js"></script>
<script src="/static/version-reload.js"></script>
<script src="/static/participant.js"></script>
<div class="version-tag" id="version-tag"></div>
<script>window.renderDeployAge && window.renderDeployAge('version-tag');</script>
<div id="qa-toast" class="qa-toast"></div>
<div id="emoji-bar">
  <button class="emoji-btn" onclick="sendEmoji('👍')">👍</button>
  <button class="emoji-btn" onclick="sendEmoji('👎')">👎</button>
  <button class="emoji-btn" onclick="sendEmoji('🤔')">🤔</button>
  <button class="emoji-btn" onclick="sendEmoji('🎉')">🎉</button>
  <button class="emoji-btn" onclick="sendEmoji('❤️')">❤️</button>
  <button class="emoji-btn" onclick="sendEmoji('🔥')">🔥</button>
  <button class="emoji-btn" onclick="sendEmoji('👏')">👏</button>
  <button class="emoji-btn" onclick="sendEmoji('😂')">😂</button>
  <button class="emoji-btn" onclick="sendEmoji('🤯')">🤯</button>
  <button class="emoji-btn" onclick="sendEmoji('💡')">💡</button>
  <button class="emoji-btn" onclick="sendEmoji('☕')">☕</button>
</div>
<div id="conference-emoji-grid" style="display:none;">
  <div class="emoji-grid">
    <button class="emoji-grid-btn" onclick="sendEmoji('❤️')">❤️</button>
    <button class="emoji-grid-btn" onclick="sendEmoji('🔥')">🔥</button>
    <button class="emoji-grid-btn" onclick="sendEmoji('👏')">👏</button>
    <button class="emoji-grid-btn" onclick="sendEmoji('😂')">😂</button>
    <button class="emoji-grid-btn" onclick="sendEmoji('🤯')">🤯</button>
    <button class="emoji-grid-btn" onclick="sendEmoji('💡')">💡</button>
    <button class="emoji-grid-btn" onclick="sendEmoji('👍')">👍</button>
    <button class="emoji-grid-btn" onclick="sendEmoji('🤔')">🤔</button>
    <button class="emoji-grid-btn" onclick="sendEmoji('💪')">💪</button>
  </div>
</div>
</body>
</html>
