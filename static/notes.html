<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Notes</title>
  <link rel="stylesheet" href="/static/common.css">
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.3rem;
      max-width: 100%;
      margin: 0;
      padding: 1.5rem 1rem;
    }
    h1 { font-size: 1.6rem; margin: 0 0 .3rem; }
    h2 { font-size: 1.4rem; margin: 1.5rem 0 .5rem; color: var(--accent); }
    .download-btn {
      display: inline-block;
      margin-left: 1rem;
      padding: .3rem .8rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: .9rem;
      cursor: pointer;
      text-decoration: none;
      vertical-align: middle;
    }
    .download-btn:hover { opacity: .85; }
    .notes-pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.17rem;
      line-height: 1.5;
      color: var(--text);
      background: var(--surface);
      border-radius: 8px;
      padding: 1rem;
      margin: 0;
    }
    .summary-list { padding-left: 0; list-style: none; }
    .summary-list li { margin-bottom: .5rem; line-height: 1.4; padding-left: 1.6em; text-indent: -1.6em; }
    .empty { color: var(--text-muted); }
    .updated { font-size: .75rem; color: var(--text-muted); text-align: right; margin-top: .5rem; }
  </style>
</head>
<body>
  <h1>Session Notes & Key Points</h1>
  <p style="font-size:.8rem; color:var(--text-muted);">Refresh this page to get the latest data.</p>

  <h2>Session Notes <button id="downloadBtn" class="download-btn" style="display:none" onclick="downloadNotes()">Download .txt</button></h2>
  <pre id="notes" class="notes-pre empty">Loading...</pre>

  <h2>Key Points</h2>
  <ul id="points" class="summary-list"><li class="empty">Loading...</li></ul>
  <div id="updated" class="updated"></div>

  <script>
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function linkify(html) {
      return html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent)">$1</a>');
    }

    let notesText = '';
    function downloadNotes() {
      if (!notesText) return;
      const blob = new Blob([notesText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'session-notes.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    const savedY = sessionStorage.getItem('notes_scrollY');

    fetch('/api/notes')
      .then(r => r.json())
      .then(data => {
        const notesEl = document.getElementById('notes');
        if (data.content) {
          notesText = data.content;
          notesEl.innerHTML = linkify(escHtml(data.content));
          notesEl.classList.remove('empty');
          document.getElementById('downloadBtn').style.display = '';
        } else {
          notesEl.textContent = 'No session notes available yet.';
        }

        const pointsEl = document.getElementById('points');
        const points = data.summary_points || [];
        if (points.length) {
          pointsEl.innerHTML = points.map(p => {
            const text = typeof p === 'string' ? p : p.text;
            const source = typeof p === 'string' ? 'discussion' : (p.source || 'discussion');
            const icon = source === 'notes' ? '&#9999;&#65039;' : '&#128172;';
            const time = (typeof p === 'object' && p.time) ? `<span class="summary-ts">${escHtml(p.time)}</span>` : '';
            return `<li>${icon} ${time}${linkify(escHtml(text))}</li>`;
          }).join('');
        } else {
          pointsEl.innerHTML = '<li class="empty">No key points yet.</li>';
        }

        if (data.summary_updated_at) {
          const d = new Date(data.summary_updated_at);
          document.getElementById('updated').textContent = 'Updated ' + d.toLocaleTimeString();
        }

        if (savedY) requestAnimationFrame(() => window.scrollTo(0, parseInt(savedY)));
      })
      .catch(() => {
        document.getElementById('notes').textContent = 'Failed to load notes.';
        document.getElementById('points').innerHTML = '<li class="empty">Failed to load.</li>';
      });

    window.addEventListener('beforeunload', () => {
      sessionStorage.setItem('notes_scrollY', String(window.scrollY));
    });
  </script>
</body>
</html>
