<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Session Notes</title>
  <link rel="stylesheet" href="/static/common.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <style>
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 1rem;
      max-width: 860px;
      margin: 0 auto;
      padding: 1.5rem 1rem;
    }
    h1 { font-size: 1.6rem; margin: 0 0 .3rem; }
    h2 { font-size: 1.3rem; margin: 1.5rem 0 .5rem; color: var(--accent); }
    .download-btn {
      display: inline-block;
      margin-left: 1rem;
      padding: .3rem .8rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: .9rem;
      cursor: pointer;
      text-decoration: none;
      vertical-align: middle;
    }
    .download-btn:hover { opacity: .85; }
    .notes-pre {
      white-space: pre-wrap;
      word-wrap: break-word;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--text);
      background: var(--surface);
      border-radius: 8px;
      padding: 1rem;
      margin: 0;
    }
    .empty { color: var(--muted); }
    .updated { font-size: .75rem; color: var(--muted); text-align: right; margin-top: .5rem; }
    #points.summary-md-content { font-size: 1rem; }
  </style>
</head>
<body>
  <h1>Session Notes & Key Points</h1>
  <p style="font-size:.8rem; color:var(--text-muted);">Refresh this page to get the latest data.</p>

  <h2>Session Notes <button id="downloadBtn" class="download-btn" style="display:none" onclick="downloadNotes()"><svg viewBox="0 0 20 20" aria-hidden="true" focusable="false" style="width:1em;height:1em;fill:currentColor;vertical-align:-.15em;margin-right:.3em;"><path d="M10 3.25a.75.75 0 0 1 .75.75v6.19l2.22-2.22a.75.75 0 1 1 1.06 1.06l-3.5 3.5a.75.75 0 0 1-1.06 0l-3.5-3.5a.75.75 0 1 1 1.06-1.06l2.22 2.22V4a.75.75 0 0 1 .75-.75Z"></path><path d="M4.5 13.75a.75.75 0 0 1 .75.75v1h9.5v-1a.75.75 0 0 1 1.5 0V16A1.5 1.5 0 0 1 14.75 17.5h-9.5A1.5 1.5 0 0 1 3.75 16v-1.5a.75.75 0 0 1 .75-.75Z"></path></svg> Download .txt</button></h2>
  <pre id="notes" class="notes-pre empty">Loading...</pre>

  <h2>Key Points</h2>
  <div id="points" class="summary-md-content"><p class="empty">Loading…</p></div>
  <div id="updated" class="updated"></div>

  <script>
    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function linkify(html) {
      return html.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent)">$1</a>');
    }

    let notesText = '';
    function downloadNotes() {
      if (!notesText) return;
      const blob = new Blob([notesText], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'session-notes.txt';
      a.click();
      URL.revokeObjectURL(url);
    }

    const sessionId = window.location.pathname.split('/')[1];
    if (!sessionId) { window.location.href = '/'; }
    const apiBase = '/' + sessionId;

    const savedY = sessionStorage.getItem('notes_scrollY');

    fetch(apiBase + '/api/notes')
      .then(r => {
        if (r.status === 404) { window.location.href = '/?error=invalid'; throw new Error('redirect'); }
        return r.json();
      })
      .then(data => {
        const notesEl = document.getElementById('notes');
        if (data.content) {
          notesText = data.content;
          notesEl.innerHTML = linkify(escHtml(data.content));
          notesEl.classList.remove('empty');
          document.getElementById('downloadBtn').style.display = '';
        } else {
          notesEl.textContent = 'No session notes available yet.';
        }

        const pointsEl = document.getElementById('points');
        const rawMd = data.raw_markdown;
        if (rawMd && typeof marked !== 'undefined') {
          pointsEl.innerHTML = marked.parse(rawMd);
        } else {
          const points = data.summary_points || [];
          if (points.length) {
            pointsEl.innerHTML = '<ul>' + points.map(p => {
              const text = typeof p === 'string' ? p : p.text;
              return `<li>${linkify(escHtml(text))}</li>`;
            }).join('') + '</ul>';
          } else {
            pointsEl.innerHTML = '<p class="empty">No key points yet.</p>';
          }
        }

        if (data.summary_updated_at) {
          const d = new Date(data.summary_updated_at);
          document.getElementById('updated').textContent = 'Updated ' + d.toLocaleTimeString();
        }

        if (savedY) requestAnimationFrame(() => window.scrollTo(0, parseInt(savedY)));
      })
      .catch(() => {
        document.getElementById('notes').textContent = 'Failed to load notes.';
        document.getElementById('points').innerHTML = '<li class="empty">Failed to load.</li>';
      });

    window.addEventListener('beforeunload', () => {
      sessionStorage.setItem('notes_scrollY', String(window.scrollY));
    });
  </script>
</body>
</html>
